name: CI/CD Pipeline
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      repository: ${{ steps.repo.outputs.repository }}
      
    steps:
      - name: Checkout repository (for Dockerfile only)
        uses: actions/checkout@v4
          
      - name: Set lowercase repository name
        id: repo
        run: echo "repository=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.repository }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile_v1.2
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [build_image]
    container: 
      image: ghcr.io/${{ needs.build_image.outputs.repository }}:${{ github.ref_name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Configure Git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
          
      - name: Navigate and check directories
        run: |
          cd $GITHUB_WORKSPACE
          pwd
          ls -la util/
          ls -la tools/
          
      - name: Run trading system (2 min live run)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          echo "Running trading_system and saving output to result.txt..."
          python3 RunTradeSystem.py

      # ── Regression gate ────────────────────────────────────────────────────
      # Reads trend CSV produced by RunTradeSystem.py and fails the job if:
      #   - any metric exceeds its absolute threshold, OR
      #   - any metric shows a statistically upward slope (potential leak)
      #
      # Tune the limits here to match your system's normal operating range.
      - name: Performance regression check
        run: |
          python3 tools/performance_monitor/check_regression.py \
            --trend_csv        build_result/trend_performance.csv \
            --mem_limit        1   \
            --thread_limit     1   \
            --handle_limit     1  \
            --slope_threshold  0.05

      # ── Upload artifacts (always, so you can inspect charts even on failure) 
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-test-artifacts
          path: build_result/
          retention-days: 7